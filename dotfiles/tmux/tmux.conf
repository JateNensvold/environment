set -g default-command "$SHELL -l"
set -g default-shell "$SHELL"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# enable clipboard passthrough in nvim
set -as terminal-features ',rxvt-unicode-256color:clipboard'
set -g allow-passthrough on

set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0


unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind -r r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g mouse on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# normal mode keybinds
bind -n C-k clear-history

# ── Pane ──────────────────────────────────────────────────────────────
# Navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# Splitting
bind -r v split-window -h -c "#{pane_current_path}"
bind -r s split-window -v -c "#{pane_current_path}"
# Kill
bind-key x kill-pane
# Claude
bind-key -r i split-window -v "$SHELL -lic 'claude-sandbox'"
bind-key -r I split-window -v "$SHELL -lic 'claude-sandbox --continue'"

# ── Window ────────────────────────────────────────────────────────────
# Navigation (vim-style with Alt modifier)
bind-key n previous-window
bind-key m next-window
# Create
bind-key -r b if-shell "tmux select-window -t :build" "" "new-window -n build"
bind-key -r C-n command-prompt -p "window name:" "if-shell 'tmux select-window -t :%1' '' 'new-window -n \"%1\"'"
# Rename
bind-key , command-prompt -I "#W" "rename-window '%%'"

# ── Session ───────────────────────────────────────────────────────────
# Navigation
bind -n C-t last-window
bind C-o switch-client -p
bind C-p switch-client -n
bind C-b display-popup -E "tmux ls -F '#{session_name}:#{window_index}:#{window_name}' | fzf --reverse | cut -d ':' -f 1-2 | xargs -I{} tmux switch-client -t '{}'"
# Create
bind-key -r f run-shell "tmux neww tmux-sessionizer"
# Rename
bind-key . command-prompt -I "#S" "rename-session '%%'"

# ── Help ──────────────────────────────────────────────────────────────
# Add keybinds to the help popup by adding: set -s @help-<key> "<description>"
set -s @help-C-k    "C-k          Clear history"
set -s @help-h      "prefix h     Pane left"
set -s @help-j      "prefix j     Pane down"
set -s @help-k      "prefix k     Pane up"
set -s @help-l      "prefix l     Pane right"
set -s @help-v      "prefix v     Split vertical"
set -s @help-s      "prefix s     Split horizontal"
set -s @help-x      "prefix x     Kill pane"
set -s @help-i      "prefix i     Open claude-sandbox"
set -s @help-I      "prefix I     Continue claude-sandbox session"
set -s @help-n      "prefix n     Previous window"
set -s @help-m      "prefix m     Next window"
set -s @help-b      "prefix b     Jump to build window"
set -s @help-C-n    "prefix C-n   New named window"
set -s @help-comma  "prefix ,     Rename window"
set -s @help-C-t    "C-t          Last window"
set -s @help-C-o    "prefix C-o   Previous session"
set -s @help-C-p    "prefix C-p   Next session"
set -s @help-C-b    "prefix C-b   Session picker (fzf)"
set -s @help-f      "prefix f     Sessionizer"
set -s @help-dot    "prefix .     Rename session"
set -s @help-?      "prefix ?     This help popup"
set -s @help-r      "prefix r     Reload config"
bind-key ? display-popup -E "tmux show-options -s | grep '^@help-' | sed 's/^@help-[^ ]* \"//;s/\"$//' | sort | fzf --reverse --no-sort"

# Status bar colors
set -g status-style 'bg=default fg=default'

# Inactive window style
# setw -g window-status-style fg=white,bg=black

# Dim inactive panes
set -g window-style 'fg=colour245,bg=colour236'
set -g window-active-style 'fg=terminal,bg=terminal'

# Windows in main status bar, highlight current with green + brackets (top row)
set -g status-left ""
set -g window-status-format " #{window_index}:#{window_name}#{?#{==:#{pane_current_command},ssh}, SSH,} "
set -g window-status-current-format "#[bg=green,fg=black,bold] [#{window_index}:#{window_name}#{?#{==:#{pane_current_command},ssh}, SSH,}] #[default]"
set -g status-right " %H:%M %d-%b-%y "
set -g status-left-length 0
set -g status-right-length 50

# Second status line showing sessions(bottom row)
set -g status 2
set -g status-format[1] "#[align=left]#(tmux-session-list #S)"
