set -g default-command "$SHELL -l"
set -g default-shell "$SHELL"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# enable clipboard passthrough in nvim
set -as terminal-features ',rxvt-unicode-256color:clipboard'
set -g allow-passthrough on

set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0


unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind -r r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g mouse on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# normal mode keybinds
bind -n C-k clear-history

bind -n C-t switch-client -l
bind-key x kill-pane

bind C-o switch-client -p
bind C-p switch-client -n
bind C-b display-popup -E "tmux ls -F '#{session_name}:#{window_index}:#{window_name}' | fzf --reverse | cut -d ':' -f 1-2 | xargs -I{} tmux switch-client -t '{}'"

bind-key -r f run-shell "tmux neww tmux-sessionizer"
bind-key -r b run-shell "tmux neww ~/.local/bin/tmux-switch-dir build"
# Spawn a claude pane in a tmux window split below the current active
bind-key -r i split-window -v claude-sandbox

# Status bar colors
# set -g status-style 'bg=#333333 fg=#5eacd3'

# Inactive window style
# setw -g window-status-style fg=white,bg=black

# Dim inactive panes
set -g window-style 'fg=colour245,bg=colour236'
set -g window-active-style 'fg=terminal,bg=terminal'

# Show all sessions in status bar, highlight current
set -g status-left "#(tmux-session-list #S)"
set -g status-right " %H:%M %d-%b-%y "
set -g status-left-length 120
set -g status-right-length 50
